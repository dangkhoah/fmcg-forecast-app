[loggers]
keys=root,uvicorn,uvicorn.access,uvicorn.error,sqlalchemy

[handlers]
keys=console,sqlfile,file

[formatters]
keys=uvicorn_timestamp_formatter

[formatter_uvicorn_timestamp_formatter]
format=%(asctime)s - %(levelname)s:    %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[logger_root]
level=INFO
handlers=console,file

[logger_uvicorn]
level=INFO
handlers=console,file
qualname=uvicorn
propagate=0

[logger_uvicorn.access]
level=INFO
handlers=console,file
qualname=uvicorn.access
propagate=0

[logger_uvicorn.error]
level=INFO
handlers=console,file
qualname=uvicorn.error
propagate=0

[logger_sqlalchemy]
level=DEBUG
handlers=sqlfile
qualname=sqlalchemy.engine
propagate=0

[handler_console]
class=StreamHandler
formatter=uvicorn_timestamp_formatter
args=(sys.stderr,)

[handler_sqlfile]
class=FileHandler
formatter=uvicorn_timestamp_formatter
args=('sqlalchemy.log', 'a')

[handler_file]
class=logging.handlers.RotatingFileHandler
formatter=uvicorn_timestamp_formatter
args=('backend.log', 'a', 5242880, 3)