[loggers]
keys=root,uvicorn,uvicorn.access,uvicorn.error

[handlers]
keys=console,file

[formatters]
keys=uvicorn_timestamp_formatter

[formatter_uvicorn_timestamp_formatter]
format=%(asctime)s - [Model-Service] - %(levelname)s:    %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[logger_root]
level=DEBUG
handlers=console,file

[logger_uvicorn]
level=INFO
handlers=console,file
qualname=uvicorn
propagate=0

[logger_uvicorn.access]
level=INFO
handlers=console,file
qualname=uvicorn.access
propagate=0

[logger_uvicorn.error]
level=INFO
handlers=console,file
qualname=uvicorn.error
propagate=0

[handler_console]
class=StreamHandler
level=INFO
# Use the uvicorn timestamp formatter for consistent console logs
formatter=uvicorn_timestamp_formatter
args=(sys.stderr,)

[handler_file]
# class=logging.handlers.RotatingFileHandler
class=concurrent_log_handler.ConcurrentRotatingFileHandler
level=DEBUG
formatter=uvicorn_timestamp_formatter
args=('../logs/model_service.log', 'a', 10485760, 3, 'utf-8')